services:
  airflow-webserver:
    image: apache/airflow:2.7.1-python3.11
    container_name: airflow_webserver_v2
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DATABASE_SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-apache-spark==4.1.3 pyspark==3.4.1 requests"
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./data/landing:/opt/airflow/landing
      - ./data/bronze:/opt/airflow/bronze
      - ./data/silver:/opt/airflow/silver
      - ./data/gold:/opt/airflow/gold
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.11
    container_name: airflow_scheduler_v2
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DATABASE_SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-apache-spark==4.1.3 pyspark==3.4.1 requests"
    volumes:
      - .:/opt/airflow  # І ТУТ ТАКОЖ
      - ./dags:/opt/airflow/dags
      - ./data/landing:/opt/airflow/landing
      - ./data/bronze:/opt/airflow/bronze
      - ./data/silver:/opt/airflow/silver
      - ./data/gold:/opt/airflow/gold
    command: scheduler

  airflow-init:
    image: apache/airflow:2.7.1-python3.11
    container_name: airflow_init_v2
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__DATABASE_SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-apache-spark==4.1.3 pyspark==3.4.1 requests"
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: 'airflow'
      _AIRFLOW_WWW_USER_PASSWORD: 'airflow'
    volumes:
      - .:/opt/airflow
    command: db init